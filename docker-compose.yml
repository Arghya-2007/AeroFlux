version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aero-flux
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    image: node:20-alpine
    working_dir: /app
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/aero-flux?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - SENTRY_DSN=${SENTRY_DSN:-}
      - NODE_ENV=${NODE_ENV:-development}
    volumes:
      - ./aeroflux-backend:/app
    ports:
      - "3001:3000" # Maps your localhost:3001 to the container's 3000
    command: sh -c "apk add --no-cache openssl openssl-dev libc6-compat && npm install && npx prisma generate && npm run start:dev"
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      - BACKEND_API_URL=http://backend:3000/api/v1
    volumes:
      - ./aeroflux-frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  postgres_data: